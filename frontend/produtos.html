<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos e Estoque - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logo_dark.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 20px 24px; cursor: pointer;">
                <img src="img/logo_dark.jpg" alt="Logo" class="logo-img" style="width: 40px; height: 40px; border-radius: 50%;">
                <span>AimSync</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="produtos.html" class="active">Produtos / Estoque</a></li>
            <li><a href="vendas.html">Ponto de Venda</a></li>
            <li data-admin-only><a href="relatorios.html">Relatório de Vendas</a></li>
            <li><a href="notas_fiscais.html">Nota Fiscal</a></li>
        </ul>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn btn-outline" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Sair do Sistema</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Produtos e Estoque</h1>
            <button onclick="openModal()" class="btn btn-primary">+ Novo Produto</button>
        </div>
        
        <div id="alertContainer" class="hidden"></div>

        <div class="card table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome do Produto</th>
                        <th>Preço (R$)</th>
                        <th>Qtd. Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-secondary);">Carregando produtos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal-overlay" id="produtoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Cadastrar Produto</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="produtoForm">
                <input type="hidden" id="produtoId">
                <div class="form-group">
                    <label for="nome">Nome do Produto *</label>
                    <input type="text" id="nome" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" class="form-control">
                </div>
                <div class="form-group">
                    <label for="preco">Preço (R$) *</label>
                    <input type="text" id="preco" class="form-control" required placeholder="0,00">
                </div>
                <div class="form-group">
                    <label for="quantidade_estoque">Estoque Inicial</label>
                    <input type="number" id="quantidade_estoque" class="form-control" required min="0" step="1">
                </div>
                <div class="form-group">
                    <label for="imagem">Foto do Produto (Opcional)</label>
                    <input type="file" id="imagem" class="form-control" accept="image/*">
                </div>
                <div class="flex justify-between mt-4">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
