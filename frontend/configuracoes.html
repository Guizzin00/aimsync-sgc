<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações da Loja - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logo_dark.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') document.documentElement.classList.add('light-theme');
            const perfil = localStorage.getItem('perfil');
            if (perfil === 'ADMIN') document.documentElement.classList.add('is-admin');
        })();
    </script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 20px 24px; cursor: pointer;">
                <img src="img/logo_dark.jpg" alt="Logo" class="logo-img" style="width: 40px; height: 40px; border-radius: 50%;">
                <span id="sidebarLojaName">AimSync</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="produtos.html">Produtos / Estoque</a></li>
            <li><a href="vendas.html">Ponto de Venda</a></li>
            <li data-admin-only><a href="relatorios.html">Relatório de Vendas</a></li>
            <li><a href="notas_fiscais.html">Nota Fiscal</a></li>
            <li data-admin-only><a href="equipe.html">👥 Equipe / Usuários</a></li>
            <li data-admin-only><a href="configuracoes.html" class="active">⚙️ Configurações</a></li>
        </ul>
        <div class="sidebar-footer" style="display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleTheme()" class="btn btn-outline" style="width: 100%;">🌓 Alternar Tema</button>
            <button onclick="logout()" class="btn btn-outline" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Sair do Sistema</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Configurações da Loja</h1>
        </div>

        <div class="card" style="max-width: 600px;">
            <form id="configForm">
                <input type="hidden" id="configId">
                <div class="form-group">
                    <label>Nome Fantasia / Nome da Loja *</label>
                    <input type="text" id="nome_loja" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>CNPJ da Empresa</label>
                    <input type="text" id="cnpj" class="form-control" placeholder="00.000.000/0000-00">
                </div>
                <div class="form-group">
                    <label>Porcentagem de Imposto Padrão (%)</label>
                    <input type="number" step="0.01" id="imposto_padrao" class="form-control" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Mensagem de Rodapé (Aparece na Nota Fiscal)</label>
                    <textarea id="mensagem_rodape" class="form-control" rows="3" placeholder="Volte sempre!"></textarea>
                </div>
                
                <div class="flex justify-between items-center mt-4">
                    <span id="saveStatus" style="color: var(--success-color); font-size: 0.9rem; font-weight: 500;"></span>
                    <button type="submit" class="btn btn-primary" id="btnSaveConfig">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/configuracoes.js"></script>
</body>
</html>
