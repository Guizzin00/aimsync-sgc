<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logosgc.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0514;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: url('img/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.6;
        }

        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: row;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(20, 11, 46, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(168, 85, 247, 0.15);
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 400px;
            }
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border-right: 1px solid rgba(168, 85, 247, 0.2);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-container {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-container img {
            max-width: 120px;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.6));
            animation: pulse-glow 4s infinite alternate;
            margin-bottom: 12px;
        }

        @keyframes pulse-glow {
            0% {
                filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4));
            }

            100% {
                filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.8));
            }
        }

        .brand-title {
            color: #f8fafc;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 6px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            margin-left: 6px;
        }

        .brand-subtitle {
            color: #cbd5e1;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-shadow: 0 0 5px rgba(168, 85, 247, 0.3);
            margin-left: 3px;
        }

        .welcome-text {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-text h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome-text p {
            color: #c4b5fd;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 0;
        }

        .login-right {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .login-left {
                padding: 30px 20px;
            }

            .login-right {
                padding: 30px 20px;
            }
        }

        .login-right h2 {
            margin: 0 0 25px 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: none;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #c4b5fd;
            width: 18px;
            height: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(10, 5, 20, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-wrapper input::placeholder {
            color: #6b7280;
            font-weight: 500;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
            background: rgba(10, 5, 20, 0.9);
        }

        .remember-me {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            margin-top: 10px;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
        }

        .remember-checkbox input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 4px;
            background: rgba(10, 5, 20, 0.7);
            margin-right: 8px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remember-checkbox input[type="checkbox"]:checked {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }

        .remember-checkbox input[type="checkbox"]:checked::after {
            content: '';
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            position: absolute;
            top: 1px;
        }

        .remember-checkbox label {
            color: #c4b5fd;
            font-size: 0.8rem;
            cursor: pointer;
            user-select: none;
        }

        .forgot-password {
            color: #c4b5fd;
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #f8fafc;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            color: #94a3b8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
<script>
    (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.documentElement.classList.add('light-theme');
        const perfil = localStorage.getItem('perfil');
        if (perfil === 'DONO') document.documentElement.classList.add('is-admin');
    })();
</script>
</head>

<body>

    <div id="particles-js"></div>

    <div class="login-wrapper">
        <!-- Lado Esquerdo: Marca e Boas Vindas -->
        <div class="login-left">
            <div class="logo-container">
                <!-- Usando o arquivo enviado pelo usuário -->
                <img src="img/logosgc.png" alt="AimSync Logo" onerror="this.src='img/logo_dark.jpg'">
                <div class="brand-title">A I M S Y N C</div>
                <div class="brand-subtitle">P R E C I S I O N &nbsp;&middot;&nbsp; S Y N C &nbsp;&middot;&nbsp; W I N
                </div>
            </div>
            <div class="welcome-text">
                <h2>Welcome back!</h2>
                <p>Faça login para acessar o sistema com a sua conta existente.</p>
            </div>
        </div>

        <!-- Lado Direito: Formulário de Login -->
        <div class="login-right">
            <!-- HEADER DINÂMICO -->
            <h2 id="formTitle">Sign In</h2>

            <div id="alertContainer" class="hidden"></div>

            <!-- FORMULÁRIO DE LOGIN -->
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">USUÁRIO</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" required autocomplete="username"
                            placeholder="Username or email">
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">SENHA</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" required autocomplete="current-password"
                            placeholder="Password">
                    </div>
                </div>

                <div class="remember-me">
                    <div class="remember-checkbox">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" id="forgotPasswordBtn" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>

                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="signUpBtn" class="forgot-password" style="font-size: 0.9rem; font-weight: 600; color: #a855f7;">Create an account</a>
                </div>

                <div class="card-footer">
                    SISTEMA DE GERENCIAMENTO COMERCIAL
                </div>
            </form>

            <!-- FORMULÁRIO DE REGISTRO (INICIALMENTE OCULTO) -->
            <form id="registerForm" style="display: none;">
                <div class="input-group">
                    <label for="reg-username">NOME DE USUÁRIO</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="reg-username" required placeholder="Choose a username">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="reg-email">E-MAIL</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="reg-email" required placeholder="Your e-mail address">
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">SENHA</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="reg-password" required placeholder="Create a password (min 6 chars)" minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn-login" style="margin-top: 10px;">Sign Up</button>

                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="signInBtn" class="forgot-password" style="font-size: 0.9rem; font-weight: 600; color: #a855f7;">Already have an account? Sign In</a>
                </div>

                <div class="card-footer">
                    SISTEMA DE GERENCIAMENTO COMERCIAL
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>

    <script>
        // Configuração do Particles.js para teias cibernéticas
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#a855f7" // Cor roxa tecnológica
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": true,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false,
                        "speed": 40,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#a855f7",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": false, // Desabilitado para não seguir o cursor
                        "mode": "grab"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 140,
                        "line_linked": {
                            "opacity": 1
                        }
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>

</html>
