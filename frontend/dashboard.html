<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logo_dark.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
<script>
    (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.documentElement.classList.add('light-theme');
        const perfil = localStorage.getItem('perfil');
        if (perfil === 'ADMIN') document.documentElement.classList.add('is-admin');
    })();
</script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 20px 24px; cursor: pointer;">
                <img src="img/logo_dark.jpg" alt="Logo" class="logo-img" style="width: 40px; height: 40px; border-radius: 50%;">
                <span>AimSync</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="produtos.html">Produtos / Estoque</a></li>
            <li><a href="vendas.html">Ponto de Venda</a></li>
            <li data-admin-only><a href="relatorios.html">Relatório de Vendas</a></li>
            <li><a href="notas_fiscais.html">Nota Fiscal</a></li>
        </ul>
        <div class="sidebar-footer" style="display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleTheme()" class="btn btn-outline" style="width: 100%;">🌓 Alternar Tema</button>
            <button onclick="logout()" class="btn btn-outline" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Sair do Sistema</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Visão Geral de Negócios (BI)</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 class="stat-title">Faturamento Total</h3>
                <div class="stat-value" id="dashFaturamento" style="color: var(--success-color);">R$ 0,00</div>
            </div>
            <div class="stat-card">
                <h3 class="stat-title">Total de Vendas</h3>
                <div class="stat-value" id="dashQtdVendas">0</div>
            </div>
            <div class="stat-card" style="display: flex; align-items: center; justify-content: center; gap: 16px;">
                <a href="vendas.html" class="btn btn-primary" style="text-decoration: none; width: 100%; text-align: center;">🛒 Iniciar PDV</a>
                <a href="produtos.html" class="btn btn-outline" style="text-decoration: none; width: 100%; text-align: center;">📦 Estoque</a>
            </div>
        </div>

        <div class="pdv-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 id="mainChartTitle">Evolução de Vendas (Últimos Dias)</h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-primary" id="btnShowSales" style="padding: 6px 12px; font-size: 0.9rem;" onclick="toggleMainChart('sales')">📈 Vendas</button>
                        <button class="btn btn-outline" id="btnShowProducts" style="padding: 6px 12px; font-size: 0.9rem;" onclick="toggleMainChart('products')">📦 Produtos</button>
                    </div>
                </div>
                <canvas id="salesChart" height="100"></canvas>
                <canvas id="mainProductsChart" height="100" style="display: none;"></canvas>
            </div>
            <div class="card">
                <h3 style="margin-bottom: 16px; text-align: center;">Produtos Mais Vendidos</h3>
                <canvas id="productsChart" height="200"></canvas>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
