<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logo_dark.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
<script>
    (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.documentElement.classList.add('light-theme');
        const perfil = localStorage.getItem('perfil');
        if (perfil === 'ADMIN') document.documentElement.classList.add('is-admin');
    })();
</script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 20px 24px; cursor: pointer;">
                <img src="img/logo_dark.jpg" alt="Logo" class="logo-img" style="width: 40px; height: 40px; border-radius: 50%;">
                <span>AimSync</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html" class="active">Clientes</a></li>
            <li><a href="produtos.html">Produtos / Estoque</a></li>
            <li><a href="vendas.html">Ponto de Venda</a></li>
            <li data-admin-only><a href="relatorios.html">Relatório de Vendas</a></li>
            <li><a href="notas_fiscais.html">Nota Fiscal</a></li>
        </ul>
        <div class="sidebar-footer" style="display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleTheme()" class="btn btn-outline" style="width: 100%;">🌓 Alternar Tema</button>
            <button onclick="logout()" class="btn btn-outline" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Sair do Sistema</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Gestão de Clientes</h1>
            <button onclick="openModal()" class="btn btn-primary">+ Novo Cliente</button>
        </div>
        
        <div id="alertContainer" class="hidden"></div>

        <div class="card table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Endereço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated via JS -->
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-secondary);">Carregando clientes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal-overlay" id="clienteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Cadastrar Cliente</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="clienteForm">
                <input type="hidden" id="clienteId">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" class="form-control" required maxlength="14" placeholder="000.000.000-00">
                </div>
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" class="form-control" maxlength="15" placeholder="(00) 00000-0000">
                </div>
                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" class="form-control">
                </div>
                <div class="flex justify-between mt-4">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
