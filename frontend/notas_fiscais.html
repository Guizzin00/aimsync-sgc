<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Fiscais - AimSync SGC</title>
    <link rel="icon" type="image/jpeg" href="img/logo_dark.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr auto;
            gap: 16px;
            align-items: end;
        }

        /* Estilos do pop-up da Nota Fiscal (para impressão) */
        .nota-fiscal-container {
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            font-size: 14px;
            color: #000;
            padding: 20px;
            background: #fff;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .nota-fiscal-container h3, .nota-fiscal-container p {
            margin: 0;
            padding: 2px 0;
        }
        
        .nota-fiscal-container hr {
            border: 1px dashed #000;
            margin: 10px 0;
        }

        .nota-item {
            display: flex;
            justify-content: space-between;
        }

        @media print {
            body {
                background: white !important;
                color: black !important;
                margin: 0;
                padding: 0;
            }
            .nota-fiscal-container, .nota-fiscal-container * {
                visibility: visible !important;
            }
            .nota-fiscal-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white !important;
                color: black !important;
            }
            /* Ocultar o sweet alert se estiver visível no print */
            .swal2-container {
                display: none !important;
            }
        }
    </style>
<script>
    (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.documentElement.classList.add('light-theme');
        const perfil = localStorage.getItem('perfil');
        if (perfil === 'DONO') document.documentElement.classList.add('is-admin');
    })();
</script>
</head>
<body>
    <!-- Mobile Hamburger -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="#" id="mainLogo" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 20px 24px; cursor: pointer;">
                <img src="img/logo_dark.jpg" alt="Logo" class="logo-img" style="width: 40px; height: 40px; border-radius: 50%;">
                <span>AimSync</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html" data-admin-only>📊 Dashboard</a></li>
            <li><a href="clientes.html">🤝 Clientes</a></li>
            <li><a href="produtos.html">📦 Produtos / Estoque</a></li>
            <li><a href="vendas.html">🛒 Ponto de Venda</a></li>
            <li data-admin-only><a href="relatorios.html" data-admin-only>📈 Relatório de Vendas</a></li>
            <li><a href="notas_fiscais.html" class="active">🧾 Nota Fiscal</a></li>
            <li data-admin-only><a href="equipe.html" data-admin-only>👥 Equipe / Usuários</a></li>
            <li data-admin-only><a href="configuracoes.html" data-admin-only>⚙️ Configurações</a></li>
        </ul>
        <div class="sidebar-footer" style="display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleTheme()" class="btn btn-outline" style="width: 100%;">🌓 Alternar Tema</button>
            <button onclick="logout()" class="btn btn-outline" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Sair do Sistema</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Emissão de Nota Fiscal</h1>
        </div>
        
        <div id="alertContainer" class="hidden"></div>

        <!-- Filters -->
        <div class="card" style="margin-bottom: 24px;">
            <form id="filterForm" class="filter-grid">
                <div class="form-group" style="margin: 0;">
                    <label for="data_inicio">Data Início</label>
                    <input type="date" id="data_inicio" class="form-control">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label for="data_fim">Data Fim</label>
                    <input type="date" id="data_fim" class="form-control">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label for="cliente_id">Cliente</label>
                    <select id="cliente_id" class="form-control">
                        <option value="">Todos os clientes</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="height: 42px;">Filtrar</button>
            </form>
        </div>

        <!-- Results Table -->
        <div class="card table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Valor Total</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-secondary);">Buscando vendas...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/notas_fiscais.js"></script>
    <script>
    (function() {
        const btn = document.getElementById('hamburgerBtn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (btn && sidebar && overlay) {
            btn.addEventListener('click', function() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            });
            overlay.addEventListener('click', function() {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            });
            sidebar.querySelectorAll('.nav-links a').forEach(function(link) {
                link.addEventListener('click', function() {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                });
            });
        }
    })();
    </script>
</body>
</html>
